<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#000000"/>
  <text x="400" y="120" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#D6EAF8" text-anchor="middle">ICE STONE</text>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#D6EAF8" text-anchor="middle">SERVICE</text>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#D6EAF8" text-anchor="middle">PRODUZIONE E CONFEZIONAMENTO</text>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#D6EAF8" text-anchor="middle">DISTRIBUZIONE A DOMICILIO</text>
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#D6EAF8" text-anchor="middle">GHIACCIO ALIMENTARE</text>
  
  <!-- Ice cubes on the left -->
  <g fill="#D6EAF8" stroke="#2E86C1" stroke-width="2">
    <rect x="60" y="100" width="80" height="60" rx="5"/>
    <rect x="150" y="120" width="70" height="50" rx="5"/>
    <rect x="100" y="170" width="90" height="70" rx="5"/>
    <rect x="70" y="240" width="100" height="60" rx="5"/>
    <rect x="180" y="200" width="60" height="80" rx="5"/>
    <rect x="150" y="290" width="90" height="50" rx="5"/>
  </g>
  
  <!-- Ice cubes on the right -->
  <g fill="#D6EAF8" stroke="#2E86C1" stroke-width="2">
    <rect x="660" y="100" width="80" height="60" rx="5"/>
    <rect x="580" y="120" width="70" height="50" rx="5"/>
    <rect x="610" y="170" width="90" height="70" rx="5"/>
    <rect x="630" y="240" width="100" height="60" rx="5"/>
    <rect x="560" y="200" width="60" height="80" rx="5"/>
    <rect x="560" y="290" width="90" height="50" rx="5"/>
  </g>
  
  <!-- Contact information -->
  <g fill="#D6EAF8">
    <!-- Phone icon -->
    <circle cx="100" cy="370" r="15" fill="none" stroke="#D6EAF8" stroke-width="2"/>
    <path d="M95,370 L105,370 M100,365 L100,375" stroke="#D6EAF8" stroke-width="2"/>
    <text x="130" y="375" font-family="Arial, sans-serif" font-size="20" font-weight="bold">+39 353 463 2562</text>
    
    <!-- Second phone -->
    <circle cx="300" cy="370" r="15" fill="none" stroke="#D6EAF8" stroke-width="2"/>
    <path d="M295,370 L305,370 M300,365 L300,375" stroke="#D6EAF8" stroke-width="2"/>
    <text x="330" y="375" font-family="Arial, sans-serif" font-size="20" font-weight="bold">+39 377 089 0066</text>
    
    <!-- Email icon and address -->
    <rect x="500" y="355" width="30" height="20" stroke="#D6EAF8" stroke-width="2" fill="none"/>
    <path d="M500,355 L515,365 L530,355" stroke="#D6EAF8" stroke-width="2" fill="none"/>
    <text x="540" y="375" font-family="Arial, sans-serif" font-size="20" font-weight="bold">INFO@ICESTONESERVICE.IT</text>
  </g>
</svg>